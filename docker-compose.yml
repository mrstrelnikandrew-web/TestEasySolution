version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info -P solo
    volumes:
      - .:/code
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    env_file:
      - .env

  beat:
      build: .
      command: celery -A app.celery_app beat --loglevel=info
      volumes:
        - .:/code
      depends_on:
        - db
        - redis
      environment:
        - POSTGRES_HOST=db
        - REDIS_HOST=redis
      env_file:
        - .env

volumes:
  postgres_data: